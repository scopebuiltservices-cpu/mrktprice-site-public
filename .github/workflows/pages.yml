name: Deploy MrktPrice site

# Publishes mrktprice.com to GitHub Pages on every push to main.
# Rebuilds the Opportunity News index, emits per-ticker static cards (Render-free universe),
# and on a nightly cron refreshes the Market Map from live data + emits static price history.

on:
  push:
    branches: [main]
  schedule:
    - cron: "20 6 * * 1-6"   # nightly Mon-Sat 06:20 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Rebuild Opportunity News index from reports/
        run: python build_reports.py

      - name: Stage site (dashboard + reports + root files)
        run: |
          mkdir -p _site/reports
          for f in *.html robots.txt marketmap.json; do [ -f "$f" ] && cp "$f" "_site/$f" || true; done
          cp -r reports/*.html _site/reports/ 2>/dev/null || true
          rm -f _site/reports/report-template.html
          cp -r splash _site/splash 2>/dev/null || true
          [ -f CNAME ] && cp CNAME _site/CNAME || echo "mrktprice.com" > _site/CNAME
          touch _site/.nojekyll

      - name: Emit static per-ticker cards (every deploy; no network)
        run: python tools/market_map/emit_static.py --universe _site/marketmap.json --out _site || echo "::warning::card emit skipped"

      - name: Refresh Market Map (live data) + static price history
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:                       # optional FREE/paid connectors — unset secrets pass through empty and are skipped
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet yfinance requests || { echo "::warning::deps install failed - keeping sample"; exit 0; }
          if python tools/market_map/build_market_map.py --real --out /tmp/mm_live.json; then
            python tools/market_map/validate_publish.py /tmp/mm_live.json _site/marketmap.json
            python tools/market_map/emit_static.py --universe _site/marketmap.json --out _site --hist --cap 250 || echo "::warning::history emit partial"
          else
            echo "::warning::live build failed - keeping committed sample marketmap.json"
          fi

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - id: deployment
        uses: actions/deploy-pages@v4
