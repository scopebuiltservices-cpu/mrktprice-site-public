name: Build + publish MrktPrice

# SINGLE self-publishing pipeline for mrktprice.com.
#
# Why this exists: the site used to be published from a SEPARATE private repo via a
# Personal Access Token (SITE_DEPLOY_TOKEN). That PAT was the fragile link - it expires,
# can be deleted, depends on an exact secret name, and when missing the build went green
# but silently stopped publishing. This workflow removes that entire failure class: it
# builds the data AND commits it to THIS repo using the built-in GITHUB_TOKEN (which
# GitHub injects on every run, auto-rotates, and cannot be deleted or misnamed), then
# deploys to Pages. No cross-repo PAT anywhere.
#
# Triggers:
#   push              -> redeploy the committed site (content edits like terminal.html)
#   schedule          -> nightly: rebuild live Market Map + xsection + history, commit, deploy
#   workflow_dispatch -> same as nightly, on demand
#
# Integrity philosophy: CORE-data failures (SAMPLE fallback, thin universe, stale/truncated
# JSON) BLOCK the publish; ENRICHMENT degradation (FMP/EODHD down) is surfaced loudly but
# still publishes prices/charts/macro. See tools/market_map/publish_guards.py.

on:
  push:
    branches: [main]
  schedule:
    - cron: "20 6 * * 1-6"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: site
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history so the change-detector can diff the whole push range
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      # ROOT-CAUSE FIX: a push that changes the build engine but NOT .rebuild (and has no
      # [rebuild] tag) used to deploy stale data — the new code sat committed but never executed.
      # This step rebuilds whenever ANY file under tools/market_map/ (engine + connectors) changes,
      # so "push new engine code" always regenerates the published data. Manual triggers kept as backup.
      - name: Detect whether a data rebuild is needed
        id: detect
        run: |
          need=false
          ev="${{ github.event_name }}"
          if [ "$ev" = "schedule" ] || [ "$ev" = "workflow_dispatch" ]; then
            need=true
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              changed=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            else
              changed=$(git diff --name-only "$before" "${{ github.sha }}" 2>/dev/null || git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            fi
            echo "changed files in push:"; echo "$changed"
            if echo "$changed" | grep -qE '^tools/market_map/|^\.rebuild$'; then need=true; fi
            if printf '%s' "${{ github.event.head_commit.message }}" | grep -q '\[rebuild\]'; then need=true; fi
          fi
          echo "need=$need" >> "$GITHUB_OUTPUT"
          echo "::notice title=Rebuild decision::data rebuild needed = $need"

      - name: Refresh Market Map (live) + xsection + static history
        if: steps.detect.outputs.need == 'true'
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY || secrets.FMP_ULTIMATE_API_KEY || secrets.FMP_UTIMATE_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          MRKT_FETCH_CURVE: "1"
          RUSSELL_LIMIT: "120"
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet yfinance requests pandas
          mkdir -p /tmp/mmbuild
          cd tools/market_map
          if python build_market_map.py --real --out /tmp/mmbuild/marketmap.json; then
            python publish_guards.py /tmp/mmbuild/marketmap.json
            cp /tmp/mmbuild/marketmap.json "$GITHUB_WORKSPACE/marketmap.json"
            cp /tmp/mmbuild/xsection.json  "$GITHUB_WORKSPACE/xsection.json" 2>/dev/null || echo "::warning::xsection.json not produced this run"
            cd "$GITHUB_WORKSPACE"
            python tools/market_map/emit_static.py --universe marketmap.json --out . --hist --cap 250 || echo "::warning::history emit partial"
            # GUARD: loud signal if the engine ran but the FMP history layer produced nothing
            # (catches "new code committed but didn't execute / connect").
            FMP_API_KEY="$FMP_API_KEY" python tools/market_map/verify_history.py marketmap.json || true
          else
            echo "::error::Real Market Map build FAILED - refusing to publish synthetic data"; exit 1
          fi

      - name: Commit refreshed data (self-publish, no PAT)
        if: steps.detect.outputs.need == 'true'
        run: |
          git config user.name  "mrktprice-bot"
          git config user.email "bot@mrktprice.com"
          git add -A marketmap.json xsection.json hist/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "::notice::no data changes to commit"
          else
            git commit -m "Market Map nightly: refresh marketmap.json + xsection.json + hist/ ($(date -u +%FT%TZ))"
            git push
            echo "published $(git rev-parse --short HEAD)"
          fi

      - uses: actions/configure-pages@v5

      - name: Rebuild reports index + stage site
        run: |
          python build_reports.py || echo "::warning::reports index rebuild skipped"
          mkdir -p _site/reports
          for f in *.html *.js robots.txt sitemap.xml marketmap.json xsection.json; do [ -f "$f" ] && cp "$f" "_site/$f" || true; done
          cp -r reports/*.html _site/reports/ 2>/dev/null || true
          rm -f _site/reports/report-template.html
          cp -r hist _site/hist 2>/dev/null || true
          cp -r splash _site/splash 2>/dev/null || true
          [ -f CNAME ] && cp CNAME _site/CNAME || echo "mrktprice.com" > _site/CNAME
          touch _site/.nojekyll

      - name: Emit static per-ticker cards (no network) + augment from committed hist
        run: python tools/market_map/emit_static.py --universe _site/marketmap.json --out _site --hist-dir _site/hist || echo "::warning::card emit skipped"

      - name: Integrity gate - inline scripts + JSON not truncated
        run: |
          node tools/check-scripts.mjs
          python tools/market_map/check_json.py _site/marketmap.json _site/xsection.json

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with: { path: '_site' }

      - id: deployment
        uses: actions/deploy-pages@v4
