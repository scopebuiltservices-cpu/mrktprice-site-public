name: verify
# Authoritative, server-side verification gate. A local pre-commit hook is bypassable with
# --no-verify, so THIS job is the real enforcement: make it a REQUIRED status check on the
# protected branch (Settings -> Branches -> branch protection rule -> Require status checks ->
# select "verify"). See tools/BRANCH_PROTECTION.md. Runs the exact same one-command gate as local.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:                         # <- stable name; this is the required-status-check target
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install schema validators (enables the declarative JSON Schema gate)
        run: python -m pip install --quiet jsonschema check-jsonschema
      - name: Full CI-equivalent verification (py_compile + all tests + script/budget/schema gates)
        run: bash tools/verify_all.sh
      - name: Coverage regression vs base branch (PR only; git baseline, no artifact plumbing)
        if: github.event_name == 'pull_request'
        run: |
          HL="$(find . -name health_log.jsonl | head -1)"
          if [ -n "$HL" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" || true
            git show "origin/${{ github.base_ref }}:$HL" > /tmp/base_health.jsonl 2>/dev/null || : > /tmp/base_health.jsonl
            python tools/market_map/coverage_regression.py "$HL" --baseline /tmp/base_health.jsonl --md >> "$GITHUB_STEP_SUMMARY"
            python tools/market_map/coverage_regression.py "$HL" --baseline /tmp/base_health.jsonl
          else echo "::notice::no health_log.jsonl to compare"; fi
