<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MrktPrice</title>
<meta name="description" content="MrktPrice — institutional-grade market intelligence."/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:
  radial-gradient(900px 600px at 50% 28%, rgba(40,60,90,.30), transparent 62%),
  linear-gradient(180deg,#080a0f 0%,#0c0f16 55%,#070809 100%);
  color:#f3f5f8;font-family:'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.wrap{display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px;
  opacity:0;animation:in .9s ease .1s forwards}
@keyframes in{to{opacity:1}}
.dove{width:auto;height:92px;display:block;margin-bottom:18px;
  filter:drop-shadow(0 8px 22px rgba(120,90,200,.28))}
.nm{font-size:clamp(26px,5vw,42px);font-weight:300;letter-spacing:.05em;color:#f6f8fb;line-height:1}
.nm b{font-weight:700}.nm .d{color:#9fb0c2;font-size:.6em}
.tag{margin-top:11px;font-size:clamp(9px,2vw,11px);letter-spacing:.44em;text-transform:uppercase;color:#8b94a3}
.enter{margin-top:26px;display:inline-block;padding:12px 36px;border-radius:11px;
  border:1px solid #3a4658;background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.03));
  color:#f3f5f8;font-weight:600;font-size:14px;letter-spacing:.05em;cursor:pointer;text-decoration:none;
  transition:border-color .15s,background .15s}
.enter:hover{border-color:#7fa0c0;background:rgba(255,255,255,.08)}
</style></head>
<body>
<div class="wrap">
  <img class="dove" src="splash/dove.png" alt="MrktPrice"/>
  <div class="nm"><b>mrkt</b>price<span class="d">.com</span></div>
  <div class="tag">Institutional-grade market intelligence</div>
  <a class="enter" href="login.html">Enter &rarr;</a>
</div>
<script>
(function(){try{var ok=localStorage.getItem('mrkt.token')||localStorage.getItem('mrkt.ok');
if(ok){location.replace('terminal.html');}}catch(e){}})();
</script>
</body></html>
