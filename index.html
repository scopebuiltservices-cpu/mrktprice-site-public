<style>

.enterbtn{position:relative;margin-left:4px;padding:11px 16px;font-weight:700;font-size:13px;color:#fff;text-decoration:none;white-space:nowrap;overflow:hidden;
 background:rgba(255,255,255,.08);border:1px solid var(--d-teal);border-radius:11px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}

@media (prefers-reduced-motion:reduce){.an,.title .gx,.userchip.landed .perchdove{animation:none}}
</style></head>

<script>
(function(){

    $('signup').onclick=function(){var e=email.value.trim(),p=pw.value;if(!validEmail(e)||p.length<8){msgset('Use a valid email and an 8+ character password.','err');return;}
      if(!needSb())return;var b=$('signup');b.disabled=true;msgset('Creating your account…');sb.auth.signUp({email:e,password:p}).then(function(r){b.disabled=false;if(r.error)msgset(r.error.message,'err');else if(!(r.data&&r.data.session))msgset('Account created — check your email to confirm, then log in.','ok');});};
    $('magic').onclick=function(){var e=email.value.trim();if(!validEmail(e)){msgset('Enter a valid email first.','err');email.focus();return;}if(!needSb())return;try{localStorage.setItem('mrkt.email',e);}catch(_){}msgset('Sending your one-tap link…');
      sb.auth.signInWithOtp({email:e,options:{emailRedirectTo:safeOrigin()+'/index.html',shouldCreateUser:true}}).then(function(r){if(r.error)msgset(r.error.message,'err');else msgset('Check your '+(isGoogle(e)?'Gmail':'email')+' — tap the link to finish.','ok');});};
  }
  var pwtoggle=$('pwtoggle');if(pwtoggle)pwtoggle.onclick=function(){var sh=pw.type==='password';pw.type=sh?'text':'password';pwtoggle.textContent=sh?'Hide':'Show';pwtoggle.setAttribute('aria-label',(sh?'Hide':'Show')+' password');pw.focus();};
  var forgot=$('forgot');if(forgot)forgot.onclick=function(){var e=email.value.trim();if(!validEmail(e)){msgset('Enter your email above, then tap Forgot password?','err');email.focus();return;}if(!needSb())return;msgset('Sending a reset link…');sb.auth.resetPasswordForEmail(e,{redirectTo:safeOrigin()+'/index.html'}).then(function(r){if(r.error)msgset(r.error.message,'err');else msgset('Check your email for a password-reset link.','ok');});};
  if(email)email.addEventListener('keydown',function(ev){if(ev.key==='Enter'){ev.preventDefault();pw.focus();}});
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&!_authed&&gbtn)gbtn.disabled=false;});
  $('codetoggle').onclick=function(){var bx=$('codebox');bx.style.display=bx.style.display==='flex'?'none':'flex';if(bx.style.display==='flex')$('code').focus();};
  $('codego').onclick=function(){var c=$('code').value.trim();if(!c){msgset('Enter your access code.','err');return;}msgset('Checking code…');
    fetch(API+'/auth',{headers:{'X-Access-Code':c},cache:'no-store'}).then(function(r){if(r.status===200){try{localStorage.setItem('mrkt.code',c);localStorage.setItem('mrkt.ok','1');}catch(e){}goAuthed('Owner / team access');}else msgset('That access code was not accepted.','err');}).catch(function(){msgset('Could not reach the data service.','err');});};
  hero.addEventListener('click',function(e){if(!_authed){e.preventDefault();if(email)email.focus();msgset('Sign in below — your dove will perch by your name, then take you in.','ok');}});
  if(pw)pw.addEventListener('keydown',function(ev){if(ev.key==='Enter')$('signin').click();});
  window.addEventListener('load',function(){var d=document.querySelector('.dovelink');if(d)d.classList.add('ready');try{var le=localStorage.getItem('mrkt.email');if(le&&email&&!email.value){email.value=le;var hot=isGoogle(le);ghint.style.display=hot?'block':'none';gbtn.classList.toggle('hot',hot);}}catch(e){}if(email){if(email.value){pw&&pw.focus();}else{email.focus();}}});
})();
</script>
</body></html>
