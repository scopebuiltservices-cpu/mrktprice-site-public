<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>

<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;background:#0a1622;overflow:hidden;
 font-family:'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif}
.stage{position:fixed;inset:0}
.stage svg{width:100%;height:100%;display:block}
.title{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;z-index:5;
 opacity:0;animation:fu 1.2s ease 1.2s forwards;text-shadow:0 2px 22px rgba(0,0,0,.9)}
.nm{font-size:clamp(26px,5.4vw,46px);font-weight:300;letter-spacing:.05em;color:#f1f6fa;line-height:1}
.nm b{font-weight:700}.nm .d{color:#9fc7d6;font-size:.6em}
.tag{margin-top:10px;font-size:clamp(9px,2vw,11px);letter-spacing:.42em;text-transform:uppercase;color:#9fc7d6;opacity:.85}
.enter{margin-top:22px;display:inline-block;padding:12px 34px;border-radius:10px;border:1px solid #4a7d94;
 background:linear-gradient(180deg,#9fcfe2,#3d7ea6);color:#06131c;font-weight:700;font-size:14px;letter-spacing:.05em;
 cursor:pointer;text-decoration:none}
.enter:hover{filter:brightness(1.07)}
@keyframes fu{from{opacity:0;transform:translate(-50%,-44%)}to{opacity:1;transform:translate(-50%,-50%)}}
@keyframes breach{0%,18%{transform:translate(338px,360px) rotate(130deg) scale(.55)}
 42%{transform:translate(326px,248px) rotate(64deg) scale(.82)}
 60%{transform:translate(322px,150px) rotate(2deg) scale(1.06)}
 70%{transform:translate(324px,126px) rotate(-3deg) scale(1.06)}
 86%{transform:translate(330px,300px) rotate(58deg) scale(.82)}
 100%{transform:translate(338px,360px) rotate(130deg) scale(.55)}}
@keyframes splash{0%,52%{opacity:0;transform:translateY(0) scale(.5)}62%{opacity:1;transform:translateY(0) scale(1)}
 84%{opacity:0;transform:translateY(-26px) scale(1.25)}100%{opacity:0}}
@keyframes wd{0%,100%{transform:translateX(0)}50%{transform:translateX(-9px)}}
.splash{transform-box:fill-box;transform-origin:bottom center;animation:splash 6.5s ease-out 1s infinite}
@media (prefers-reduced-motion:reduce){.orca{animation:none!important;transform:translate(338px,360px) rotate(130deg) scale(.7)!important}.splash{display:none}}
</style></head>
