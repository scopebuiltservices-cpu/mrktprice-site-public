<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MrktPrice — Sign in</title>
<meta name="description" content="MrktPrice — institutional-grade market intelligence. Sign in with your access code."/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="64x64" href="splash/favicon-dove-green.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="splash/favicon-32-green.png"/>
<link rel="apple-touch-icon" href="splash/apple-touch-dove-green.png"/>
<meta name="theme-color" content="#0f3d33"/><meta name="color-scheme" content="dark"/>
<meta property="og:type" content="website"/><meta property="og:title" content="MrktPrice — institutional-grade market intelligence"/>
<meta property="og:description" content="Sign in to MrktPrice. Read Opportunity News free."/>
<meta property="og:url" content="https://mrktprice.com/"/>
<meta property="og:image" content="https://mrktprice.com/splash/og-card.png"/>
<style>
:root{--ink:#f3f8f5;--muted:#a9c5ba;--line:rgba(255,255,255,.12);--line2:rgba(255,255,255,.2);
 --mint:#2fd1c0;--mint2:#27e0b0;--accent-ink:#06231d}
*{box-sizing:border-box}
::selection{background:rgba(47,209,192,.34);color:#fff}
html,body{margin:0;min-height:100%;color:var(--ink);overflow-x:hidden;
 font:15px/1.55 'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
/* crisp vector low-poly background */
body{background:#0f3d33 url("splash/bg-green.svg") center/cover no-repeat fixed}
.veil{position:fixed;inset:0;z-index:0;pointer-events:none;
 background:radial-gradient(900px 620px at 50% 22%,rgba(58,156,132,.18),transparent 62%),linear-gradient(180deg,rgba(7,30,25,.10),rgba(7,30,25,.34))}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px 22px}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.an{opacity:0;animation:rise .8s cubic-bezier(.4,.1,.2,1) forwards}
.dove{width:clamp(132px,20vw,184px);height:auto;display:block;margin:0 auto;
 image-rendering:auto;filter:drop-shadow(0 18px 40px rgba(0,0,0,.5)) drop-shadow(0 0 30px rgba(47,209,192,.16))}
.title{font-size:clamp(32px,7.4vw,54px);font-weight:200;letter-spacing:.004em;line-height:1;color:#fff;white-space:nowrap;margin-top:14px}
.title b{font-weight:600}.title .d{font-weight:200;opacity:.55;font-size:.56em;letter-spacing:.02em}
.tag{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-top:12px}
.card{position:relative;width:min(380px,92vw);margin-top:30px;display:flex;flex-direction:column;gap:11px;
 background:rgba(8,34,28,.46);border:1px solid var(--line);border-radius:16px;padding:22px 20px;
 -webkit-backdrop-filter:blur(10px) saturate(1.1);backdrop-filter:blur(10px) saturate(1.1);
 box-shadow:0 30px 70px -34px rgba(0,0,0,.7)}
label.cl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-align:left;margin:0 2px -3px}
.card input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--line2);border-radius:11px;color:#fff;
 padding:13px 14px;font:15px 'Inter',sans-serif;letter-spacing:.04em;outline:none;transition:border-color .15s,box-shadow .15s}
.card input::placeholder{color:#8fb0a5}
.card input:focus{border-color:var(--mint);box-shadow:0 0 0 3px rgba(47,209,192,.18)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;font-size:15px;font-weight:700;
 cursor:pointer;border-radius:11px;border:1px solid transparent;color:var(--accent-ink);
 background:linear-gradient(120deg,var(--mint2),var(--mint));transition:filter .15s,box-shadow .15s,transform .08s}
.btn:hover{filter:brightness(1.06);box-shadow:0 12px 28px -12px rgba(47,209,192,.6)}
.btn:active{transform:translateY(1px)}
.msg{min-height:16px;font-size:12px;margin:2px 2px 0;color:var(--muted)}
.msg.err{color:#ffb1b1}.msg.ok{color:var(--mint2)}
.news{margin-top:22px}.news a{color:var(--muted);text-decoration:none;font-size:13px;border-bottom:1px solid transparent;transition:color .15s,border-color .15s}
.news a:hover{color:#fff;border-color:var(--mint)}
.hint{font-size:11px;color:var(--muted);opacity:.85;margin-top:8px}
@media (prefers-reduced-motion:reduce){.an{animation:none;opacity:1}body{background-attachment:scroll}}
.srcstat{width:min(380px,92vw);margin-top:16px;background:rgba(8,34,28,.46);border:1px solid var(--line);border-radius:14px;padding:13px 16px;text-align:left;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.srcstat h4{margin:0 0 4px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:8px}
.srcstat h4 .asof{font-weight:400;letter-spacing:.02em;text-transform:none;font-size:10px}
.srcrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:5px 0;border-top:1px solid var(--line);font-size:12.5px}
.srcrow:first-of-type{border-top:none}
.srcrow .nm{color:var(--ink)} .srcrow .nm small{color:var(--muted);display:block;font-size:10.5px;letter-spacing:.01em}
.pill{font-size:10px;font-weight:700;letter-spacing:.03em;padding:2px 8px;border-radius:999px;white-space:nowrap}
.pill.ok{background:rgba(39,224,176,.16);color:#27e0b0}.pill.warn{background:rgba(224,193,74,.18);color:#e8d27a}.pill.down{background:rgba(240,85,107,.16);color:#ff9aa8}.pill.na{background:rgba(255,255,255,.08);color:#a9c5ba}
.srcalert{margin-top:10px;font-size:11.5px;line-height:1.5;padding:8px 10px;border-radius:9px;background:rgba(240,85,107,.14);color:#ffc2c2;border:1px solid rgba(240,85,107,.32);display:none}
.srcalert.show{display:block}
</style></head>
<body>
<div class="veil"></div>
<div class="wrap">
  <img class="dove an" style="animation-delay:.05s" src="splash/dove-green.png" width="698" height="848" alt="MrktPrice dove" decoding="async"/>
  <h1 class="title an" style="animation-delay:.16s"><b>mrkt</b>price<span class="d">.com</span></h1>
  <div class="tag an" style="animation-delay:.24s">Institutional-grade market intelligence</div>
  <div class="card an" style="animation-delay:.32s">
    <label class="cl" for="code">Access code</label>
    <input id="code" type="password" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Enter your access code" aria-label="Access code"/>
    <button class="btn" id="go" type="button">Enter →</button>
    <div class="msg" id="msg" role="status" aria-live="polite"></div>
    <div class="hint">Owner access. Your code unlocks the live terminal &amp; Opportunity Map.</div>
  </div>
  <div class="news an" style="animation-delay:.4s"><a href="reports/index.html">Read Opportunity News — free →</a></div>
  <div class="srcstat an" id="srcstat" style="animation-delay:.48s;display:none">
    <h4>Data sources <span class="asof" id="srcAsof"></span></h4>
    <div id="srcRows"></div>
    <div class="srcalert" id="srcAlert"></div>
  </div>
</div>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  function msg(t,cls){var m=$('msg');m.textContent=t||'';m.className='msg'+(cls?' '+cls:'');}
  function enter(){
    var c=($('code').value||'').trim();
    if(!c){msg('Enter your access code to continue.','err');$('code').focus();return;}
    try{localStorage.setItem('mrkt.code',c);localStorage.removeItem('mrkt.token');}catch(e){}
    msg('Welcome — opening your terminal…','ok');
    setTimeout(function(){location.href='terminal.html';},320);
  }
  $('go').addEventListener('click',enter);
  $('code').addEventListener('keydown',function(e){if(e.key==='Enter')enter();});
  // already signed in? offer straight through
  try{if(localStorage.getItem('mrkt.code')||localStorage.getItem('mrkt.token')){msg('You have an active session — press Enter to continue.');}}catch(e){}
  $('code').focus();
})();
</script>
<script>
/* === MrktPrice data-source status: reads published health, shows each source live/limited/down === */
(function(){
  function pill(c,t){return '<span class="pill '+c+'">'+t+'</span>';}
  function ageDays(a){try{return Math.floor((Date.now()-new Date(a+'T00:00:00Z').getTime())/86400000);}catch(e){return null;}}
  fetch('marketmap.json',{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
    var dh=d.dataHealth||{}, asof=d.asof||'—', live=String(d.source||'').toLowerCase().indexOf('live')>=0;
    var names=(d.names||[]).filter(function(n){return !(n.idx&&n.idx.indexOf('FACTOR')>=0);});
    var withVal=names.filter(function(n){return n.val&&n.val.pe!=null;}).length;
    var valPct=names.length?Math.round(100*withVal/names.length):0;
    var age=ageDays(asof), stale=(age==null||age>4);
    var fr=dh.fmpKeyReason, fv=dh.fmpKeyValid, fmp;
    if(fv===true||(dh.fmpOk||0)>0) fmp=['ok','Live'];
    else if(!dh.fmpKey) fmp=['na','Not set'];
    else if(fr==='invalid_key') fmp=['down','Key invalid'];
    else if(fr==='rate_limited') fmp=['warn','Rate-limited'];
    else if(fr==='plan_or_endpoint') fmp=['warn','Plan limit'];
    else fmp=['warn','No data'];
    var eod=((dh.eodOk||0)>0)?['ok','Live']:(dh.eodKey?['warn','Add-on off']:['na','Not set']);
    var rows=[
      ['Prices & charts','yfinance — live OHLCV', live?['ok','Live']:['down','Down']],
      ['Valuations','yfinance fundamentals — '+valPct+'% coverage', valPct>50?['ok','Live']:(valPct>0?['warn','Partial']:['down','None'])],
      ['Cross-section & macro','computed — corr · beta · regime', live?['ok','Live']:['warn','—']],
      ['Treasury curve','FRED — keyless', live?['ok','Live']:['na','—']],
      ['Fundamentals','SEC EDGAR — keyless', ['ok','Live']],
      ['Valuation cross-check','FMP Ultimate', fmp],
      ['Options & dealer gamma','EODHD UnicornBay', eod]
    ];
    var sa=document.getElementById('srcAsof'); if(sa) sa.textContent=(stale?'STALE · ':'updated ')+asof;
    var rr=document.getElementById('srcRows'); if(rr) rr.innerHTML=rows.map(function(r){
      return '<div class="srcrow"><span class="nm">'+r[0]+'<small>'+r[1]+'</small></span>'+pill(r[2][0],r[2][1])+'</div>';}).join('');
    var msgs=[];
    if(stale) msgs.push('⚠ Data not updating — last successful refresh '+asof+'. The nightly pull may have failed.');
    if(fmp[0]==='down') msgs.push('FMP Ultimate key invalid'+(dh.fmpKeyMessage?' ('+dh.fmpKeyMessage+')':'')+' — valuations are running on the free feed.');
    var al=document.getElementById('srcAlert'); if(al&&msgs.length){al.innerHTML=msgs.join('<br>');al.className='srcalert show';}
    var box=document.getElementById('srcstat'); if(box) box.style.display='block';
  }).catch(function(){});
})();
</script>
</body></html>
