<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MrktPrice — Sign in</title>
<meta name="description" content="MrktPrice — institutional-grade market intelligence. Sign in."/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--text:#fff;--muted:#bfe7d8;--line:rgba(255,255,255,.16);--line2:rgba(255,255,255,.26);
 --neon:#28e0a6;--neon-lo:#16b487;--ink:#04261d;--err:#ffb3b3;--ok:#9bf0cf}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;color:var(--text);background:#0a3327;
 font:15px/1.55 'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.bg{position:fixed;inset:0;width:100%;height:100%;z-index:0}
.glow{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(760px 520px at 50% 16%,rgba(80,255,205,.10),transparent 64%)}
.scrim{position:fixed;inset:0;z-index:0;pointer-events:none;background:linear-gradient(180deg,rgba(8,40,30,.30),rgba(7,33,25,.50))}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 22px}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.an{opacity:0;animation:rise .9s cubic-bezier(.4,.1,.2,1) forwards}
.dove{height:clamp(104px,17vw,152px);width:auto;display:block;
 filter:drop-shadow(0 0 22px rgba(60,240,180,.45)) drop-shadow(0 8px 20px rgba(0,0,0,.35))}
.dovelink{display:inline-block;margin-bottom:6px;cursor:pointer;transition:transform .2s}
.dovelink:hover{transform:translateY(-4px) scale(1.03)}
.dovelink.ready .dove{animation:hover 3.4s ease-in-out infinite}
@keyframes hover{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.title{font-size:clamp(30px,7vw,52px);font-weight:300;letter-spacing:.03em;color:#fff;line-height:1;margin:4px 0 2px}
.title b{font-weight:700}.title .d{font-weight:300;opacity:.8;font-size:.62em}
.tag{font-size:10.5px;letter-spacing:.44em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.card{width:min(360px,92vw);margin-top:20px;display:flex;flex-direction:column;gap:10px;
 background:linear-gradient(180deg,rgba(10,40,31,.66),rgba(8,33,25,.72));border:1px solid var(--line);border-radius:16px;padding:20px 18px;
 box-shadow:0 26px 60px -30px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.10);transition:opacity .45s,transform .45s}
.card.gone{opacity:0;transform:translateY(18px) scale(.97);pointer-events:none}
.gbtn{display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(125deg,#fff 0 60%,#e9f6f0 60% 100%);color:#13201b;border:0;
 padding:13px;font-size:14px;font-weight:600;cursor:pointer;transition:filter .15s;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)}
.gbtn:hover{filter:brightness(.97)}.gbtn.hot{box-shadow:0 0 0 3px rgba(40,224,166,.5)}
.ghint{font-size:11px;color:var(--neon);margin:-4px 2px 0;display:none}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;margin:3px 0 1px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
.card input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--line2);border-radius:11px;color:#fff;
 padding:12px 13px;font:14px 'Inter',sans-serif;outline:none;transition:border-color .15s,box-shadow .15s}
.card input::placeholder{color:#9fc3b5}
.card input:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(40,224,166,.22)}
.row{display:flex;gap:9px}.row>button{flex:1}
.act,.ghost{padding:13px;font-weight:700;font-size:14px;cursor:pointer;border:0;transition:filter .15s;
 clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)}
.act{color:var(--ink);background:linear-gradient(125deg,#5cf0c0 0 46%,#19b88a 46% 100%)}.act:hover{filter:brightness(1.07)}
.ghost{font-weight:600;color:#eafff6;background:linear-gradient(125deg,rgba(73,160,133,.5) 0 46%,rgba(42,107,86,.5) 46% 100%)}.ghost:hover{filter:brightness(1.12)}
button[disabled]{opacity:.6;cursor:default}
.linkrow{display:flex;justify-content:space-between;font-size:12px;margin-top:2px;flex-wrap:wrap;gap:6px}
.linkrow a{color:var(--muted);cursor:pointer;text-decoration:none;border-bottom:1px dotted rgba(255,255,255,.3)}
.linkrow a:hover{color:#fff}
#codebox{display:none;flex-direction:column;gap:10px;margin-top:2px}
.msg{min-height:16px;font-size:12px;color:var(--muted);text-align:center}.msg.err{color:var(--err)}.msg.ok{color:var(--ok)}
.news{margin-top:18px;font-size:12.5px;color:var(--muted);text-decoration:none}.news:hover{color:#fff}
.userchip{position:fixed;left:50%;bottom:15vh;transform:translateX(-50%) translateY(12px);z-index:6;display:flex;align-items:center;gap:13px;
 background:linear-gradient(180deg,rgba(12,46,35,.88),rgba(8,33,25,.93));border:1px solid var(--line2);border-radius:20px;padding:11px 14px 11px 11px;
 box-shadow:0 26px 64px -28px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.08);opacity:0;pointer-events:none;transition:opacity .5s,transform .5s}
.userchip.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.perchwrap{position:relative;width:50px;height:50px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.perchdove{height:48px;width:auto;opacity:0;transform-origin:bottom center;filter:drop-shadow(0 0 14px rgba(80,255,205,.6))}
.userchip.landed .perchdove{animation:perchbob 3.4s ease-in-out infinite}
@keyframes perchbob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-2px) rotate(-2deg)}}
.uinfo{display:flex;flex-direction:column;align-items:flex-start;line-height:1.25;min-width:0}
.uname{font-size:14px;font-weight:600;color:#fff;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.usub{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.enterbtn{margin-left:4px;padding:11px 16px;font-weight:700;font-size:13px;color:var(--ink);text-decoration:none;white-space:nowrap;
 background:linear-gradient(125deg,#5cf0c0 0 46%,#19b88a 46% 100%);clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px)}
.enterbtn:hover{filter:brightness(1.08)}
.flydove{position:fixed;z-index:50;pointer-events:none;filter:drop-shadow(0 12px 26px rgba(0,0,0,.5)) drop-shadow(0 0 26px rgba(80,255,205,.5))}
@media (prefers-reduced-motion:reduce){.an,.dovelink.ready .dove,.userchip.landed .perchdove{animation:none}}
</style></head>
<body>
<svg class="bg" viewBox="0 0 640 600" preserveAspectRatio="xMidYMid slice" aria-hidden="true"><polygon points="0,0 213,0 0,200" fill="#2c6e58"/><polygon points="213,0 0,200 220,210" fill="#357e66"/><polygon points="213,0 426,0 220,210" fill="#2a6b56"/><polygon points="426,0 220,210 440,200" fill="#3d8c72"/><polygon points="426,0 640,0 440,200" fill="#316f5b"/><polygon points="640,0 440,200 640,210" fill="#43967b"/><polygon points="0,200 220,210 0,400" fill="#4fa388"/><polygon points="220,210 0,400 230,410" fill="#2e7460"/><polygon points="220,210 440,200 230,410" fill="#3a8970"/><polygon points="440,200 230,410 450,400" fill="#336b5a"/><polygon points="440,200 640,210 450,400" fill="#3c8b73"/><polygon points="640,210 450,400 640,400" fill="#49a085"/><polygon points="0,400 230,410 0,600" fill="#2a6b56"/><polygon points="230,410 0,600 240,600" fill="#357e66"/><polygon points="230,410 450,400 240,600" fill="#43967b"/><polygon points="450,400 240,600 450,600" fill="#2f7762"/><polygon points="450,400 450,600 640,600" fill="#49a085"/><polygon points="450,400 640,600 640,400" fill="#357e66"/></svg><div class="glow"></div><div class="scrim"></div>
<div class="wrap">
  <a id="enter" href="terminal.html" class="dovelink an" style="animation-delay:.05s" title="Click the dove to enter"><img class="dove" src="splash/dove.png" alt="MrktPrice — click the dove to enter"/></a>
  <div class="title an" style="animation-delay:.18s"><b>mrkt</b>price<span class="d">.com</span></div>
  <div class="tag an" style="animation-delay:.28s">Institutional-grade market intelligence</div>
  <div class="card an" style="animation-delay:.4s">
    <button id="google" class="gbtn">
      <svg width="17" height="17" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 5.1 29.6 3 24 3 16 3 9.1 7.6 6.3 14.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 10-2 13.6-5.2l-6.3-5.2C29.2 35.5 26.7 36.5 24 36.5c-5.3 0-9.7-2.6-11.3-7l-6.5 5C9 40.3 15.9 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.6l6.3 5.2C41.5 36.6 44 31 44 24c0-1.2-.1-2.3-.4-3.5z"/></svg>
      Continue with Google
    </button>
    <div class="ghint" id="ghint">Gmail detected — you can also get a one-tap link below.</div>
    <div class="divider">or with your email</div>
    <input id="email" placeholder="you@email.com" autocomplete="email" inputmode="email"/>
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password"/>
    <div class="row"><button id="signin" class="act">Log in</button><button id="signup" class="ghost">Create account</button></div>
    <div class="linkrow"><a id="magic">Email me a one-tap link</a><a id="codetoggle">Have an access code?</a></div>
    <div id="codebox"><input id="code" placeholder="Owner / team access code" autocomplete="off"/><button id="codego" class="ghost">Enter with access code</button></div>
    <div class="msg" id="msg"></div>
  </div>
  <a class="news an" style="animation-delay:.5s" href="reports/index.html">Read Opportunity News — free &rarr;</a>
</div>
<div id="userchip" class="userchip">
  <div class="perchwrap"><img id="perch" class="perchdove" src="splash/dove.png" alt=""/></div>
  <div class="uinfo"><span class="uname" id="uname">Signed in</span><span class="usub">your guardian · signed in</span></div>
  <a class="enterbtn" id="enterbtn" href="terminal.html">Enter <span aria-hidden="true">&rarr;</span></a>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var SUPABASE_URL='https://jnatyouqlrdhmghnluzv.supabase.co', SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuYXR5b3VxbHJkaG1naG5sdXp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NzY0MzgsImV4cCI6MjA5NzA1MjQzOH0.AdJLcTE46ci7XSKckxv2cQWIFWPp6BXdHrIspay4Ajg';
  var API=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://localhost:8000':'https://mrktprice-data.onrender.com';
  var $=function(i){return document.getElementById(i);};
  var email=$('email'),pw=$('pw'),gbtn=$('google'),ghint=$('ghint'),card=document.querySelector('.card'),chip=$('userchip'),hero=$('enter');
  function msgset(t,c){var m=$('msg');if(m){m.textContent=t;m.className='msg'+(c?' '+c:'');}}
  var sb=(window.supabase&&/^https:\/\//.test(SUPABASE_URL))?window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON):null;
  if(!sb)msgset('Sign-in is not configured yet.','err');
  function persist(s){try{localStorage.setItem('mrkt.token',s.access_token);localStorage.setItem('mrkt.refresh',s.refresh_token||'');localStorage.setItem('mrkt.email',(s.user&&s.user.email)||'');localStorage.setItem('mrkt.ok','1');}catch(e){}}
  function isGoogle(v){return /@(gmail|googlemail)\.com\s*$/i.test(v);}
  var _authed=false;
  function flyToPerch(){
    var hi=hero.querySelector('.dove'), perch=$('perch');
    var a=hi.getBoundingClientRect(), b=perch.getBoundingClientRect();
    if(!a.width||!b.width){perch.style.opacity='1';chip.classList.add('landed');hero.style.visibility='hidden';return;}
    var fly=hi.cloneNode(true);fly.removeAttribute('class');fly.className='flydove';
    fly.style.left=a.left+'px';fly.style.top=a.top+'px';fly.style.width=a.width+'px';fly.style.height=a.height+'px';fly.style.margin='0';
    document.body.appendChild(fly);hero.style.visibility='hidden';
    var dx=b.left-a.left, dy=b.top-a.top, sc=b.width/a.width, lift=Math.max(70,Math.abs(dx)*0.18);
    var anim=fly.animate([
      {transform:'translate(0,0) scale(1) rotate(0deg)',offset:0},
      {transform:'translate('+(dx*0.3)+'px,'+(dy*0.3-lift)+'px) scale('+(0.84+0.16*sc)+') rotate(-8deg)',offset:.34},
      {transform:'translate('+(dx*0.64)+'px,'+(dy*0.64-lift*0.45)+'px) scale('+(0.55+0.45*sc)+') rotate(6deg)',offset:.64},
      {transform:'translate('+dx+'px,'+dy+'px) scale('+sc+') rotate(0deg)',offset:1}
    ],{duration:1300,easing:'cubic-bezier(.45,.03,.2,1)',fill:'forwards'});
    anim.onfinish=function(){perch.style.opacity='1';chip.classList.add('landed');try{fly.remove();}catch(e){}};
  }
  function goAuthed(label){
    if(_authed)return;_authed=true;
    $('uname').textContent=label||'Signed in';
    if(card)card.classList.add('gone');
    chip.classList.add('show');
    requestAnimationFrame(function(){requestAnimationFrame(flyToPerch);});
  }
  if(sb){
    sb.auth.onAuthStateChange(function(ev,session){
      if(session&&(ev==='SIGNED_IN'||ev==='INITIAL_SESSION'||ev==='TOKEN_REFRESHED')){persist(session);goAuthed((session.user&&session.user.email)||'Signed in');}
    });
    gbtn.onclick=function(){msgset('Redirecting to Google…');gbtn.disabled=true;
      sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+'/index.html'}}).then(function(r){if(r&&r.error){gbtn.disabled=false;msgset(r.error.message+' (if Google is not enabled yet, use the email link).','err');}});};
    email.addEventListener('input',function(){var hot=isGoogle(email.value.trim());ghint.style.display=hot?'block':'none';gbtn.classList.toggle('hot',hot);});
    $('signin').onclick=function(){var e=email.value.trim(),p=pw.value;if(!e||!p){msgset('Enter your email and password — or use the one-tap link.','err');return;}
      var b=$('signin');b.disabled=true;msgset('Signing in…');sb.auth.signInWithPassword({email:e,password:p}).then(function(r){b.disabled=false;if(r.error)msgset(r.error.message,'err');});};
    $('signup').onclick=function(){var e=email.value.trim(),p=pw.value;if(!e||p.length<8){msgset('Use a valid email and an 8+ character password.','err');return;}
      var b=$('signup');b.disabled=true;msgset('Creating your account…');sb.auth.signUp({email:e,password:p}).then(function(r){b.disabled=false;if(r.error)msgset(r.error.message,'err');else if(!(r.data&&r.data.session))msgset('Account created — check your email to confirm, then log in.','ok');});};
    $('magic').onclick=function(){var e=email.value.trim();if(!e){msgset('Enter your email first.','err');email.focus();return;}msgset('Sending your one-tap link…');
      sb.auth.signInWithOtp({email:e,options:{emailRedirectTo:location.origin+'/index.html',shouldCreateUser:true}}).then(function(r){if(r.error)msgset(r.error.message,'err');else msgset('Check your '+(isGoogle(e)?'Gmail':'email')+' — tap the link to finish.','ok');});};
  }
  $('codetoggle').onclick=function(){var bx=$('codebox');bx.style.display=bx.style.display==='flex'?'none':'flex';if(bx.style.display==='flex')$('code').focus();};
  $('codego').onclick=function(){var c=$('code').value.trim();if(!c){msgset('Enter your access code.','err');return;}msgset('Checking code…');
    fetch(API+'/auth',{headers:{'X-Access-Code':c},cache:'no-store'}).then(function(r){if(r.status===200){try{localStorage.setItem('mrkt.code',c);localStorage.setItem('mrkt.ok','1');}catch(e){}goAuthed('Owner / team access');}else msgset('That access code was not accepted.','err');}).catch(function(){msgset('Could not reach the data service.','err');});};
  hero.addEventListener('click',function(e){if(!_authed){e.preventDefault();if(email)email.focus();msgset('Sign in below — your dove will perch by your name, then take you in.','ok');}});
  if(pw)pw.addEventListener('keydown',function(ev){if(ev.key==='Enter')$('signin').click();});
})();
</script>
</body></html>
