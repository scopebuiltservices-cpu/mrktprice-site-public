  function netflow(n){return (n.flow&&n.flow.net1m===n.flow.net1m)?n.flow.net1m:0;}

    else {xs=ns.map(function(n){return n.z.size;});ys=ns.map(function(n){return n.ff.HML;});xl='Size z (large →)';yl='Value loading (HML)';x0=0;y0=0;}
    var xr=ext(xs),yr=ext(ys);axes(W,H,pad,xr,yr,xl,yl,x0,y0);pts=[];var mc=ns.map(function(n){return Math.log(n.mcap);}),mcr=ext(mc);
    ns.forEach(function(n,i){var px=pad+(xs[i]-xr[0])/(xr[1]-xr[0]||1)*(W-pad-12),py=8+(yr[1]-ys[i])/(yr[1]-yr[0]||1)*(H-pad-8),r=3+7*(mc[i]-mcr[0])/((mcr[1]-mcr[0])||1);

  function treemap(){

    var bySec={};ns.forEach(function(n){(bySec[n.sec]=bySec[n.sec]||[]).push(n);});function sum(a){return a.reduce(function(s,n){return s+n.mcap;},0);}

    if(!n){g.fillStyle='#8a93a0';g.font='13px sans-serif';g.textAlign='center';g.fillText('Sector correlation unavailable — awaiting a fresh build',W/2,H/2);g.textAlign='left';legend(false,true);$('count').textContent='Sector correlation unavailable';return;}

    var d=size(Math.max(40+secs.length*30,300)),W=d[0],H=d[1];g.clearRect(0,0,W,H);g.fillStyle='#0d121b';g.fillRect(0,0,W,H);

      if(b.optTilt!=null)h+=row('Composite options tilt',(b.optTilt>0?'+':'')+b.optTilt+' <span class="vbadge v-na">'+(b.optTiltStatus||'provisional')+'</span>');
      h+='</table><div style="font-size:11px;color:var(--muted,#8a93a0);margin-top:4px">Richness &gt;110% = options price in more vol than realized (premium-selling bias); &lt;95% = cheap. Composite tilt is provisional &amp; uncalibrated \u2014 not a recommendation.</div>';}
    if(n.short){var sp=n.short;var scl=sp.trend==='rising'?'v-rejected':sp.trend==='falling'?'v-supported':'v-mixed';
      h+='<h3>Short pressure — SEC fails-to-deliver (free)</h3><table class="kv">';
      h+=row('Fails trend','<span class="vbadge '+scl+'">'+sp.trend+'</span> · '+sp.level);
      h+=row('Fails (current / prior)',fmtM(sp.fails)+' / '+fmtM(sp.prevFails));
      h+='</table>';}
    if(n.alerts&&n.alerts.length)h+='<h3>Alerts</h3><div style="font-size:12px">'+n.alerts.join(' · ')+'</div>';
    return h;}
  function openBrief(t){var n=null,i;for(i=0;i<D.names.length;i++){if(D.names[i].t===t){n=D.names[i];break;}}if(!n)return;
    $('briefBody').innerHTML=renderBrief(n);$('brief').classList.remove('hidden');
    $('bjson').onclick=function(){var blob=new Blob([JSON.stringify(briefCard(n),null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='brief_'+n.t+'.json';document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(a.href);},1500);};
    $('bprint').onclick=function(){window.print();};
    $('bclose').onclick=function(){$('brief').classList.add('hidden');};}
})();
</script>
<div id="brief" class="brief hidden"><div class="briefcard"><div class="briefbar"><button id="bjson">Download JSON</button><button id="bprint">Print / Save PDF</button><button id="bclose">Close</button></div><div id="briefBody"></div></div></div>
</body></html>
