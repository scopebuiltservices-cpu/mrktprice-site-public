<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>mrktprice.com — Market Map</title>
<style>
:root{--bg:#0a0d12;--panel:#11161f;--muted:#8a93a0;--accent:#16c79a;--line:rgba(255,255,255,.14)}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:#e7ecf2;font:13px/1.4 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--line)}
.brand{font-size:18px;font-weight:300}.brand b{font-weight:700}
.sub{color:var(--muted);font-size:11px;letter-spacing:.04em}.spacer{flex:1}
a.home{color:var(--muted);text-decoration:none;font-size:12px}a.home:hover{color:#fff}
.tabs{display:flex;gap:6px;padding:10px 16px 0;flex-wrap:wrap}
.tab{padding:7px 12px;border:1px solid var(--line);border-bottom:none;border-radius:8px 8px 0 0;background:transparent;color:var(--muted);cursor:pointer;font-size:12px}
.tab.on{background:var(--panel);color:#fff}
.bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 16px;border-top:1px solid var(--line);background:var(--panel)}
.bar label{color:var(--muted);font-size:11px}
select{background:#0d121b;border:1px solid var(--line);color:#e7ecf2;border-radius:8px;padding:6px 9px;font-size:12px;cursor:pointer}
.wrap{padding:12px 16px 28px}
.cv{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;display:block}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:5px}.dot{width:9px;height:9px;border-radius:50%}
.tip{position:fixed;pointer-events:none;background:#0d121b;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:11px;display:none;z-index:9;max-width:240px}
.tip b{color:#fff}.note{color:var(--muted);font-size:11px;margin:8px 2px}.hidden{display:none}
</style></head>
<body>
<div class="top">
  <div class="brand"><b>mrkt</b>price<span style="color:var(--muted)">.com</span> &nbsp;Market Map</div>
  <div class="sub" id="asof">loading…</div><div class="spacer"></div>
  <a class="home" href="index.html">&larr; Terminal</a>
</div>
<div class="tabs">
  <button class="tab on" data-v="scatter">Scatter</button>
  <button class="tab" data-v="treemap">Return treemap</button>
  <button class="tab" data-v="corr">Correlation</button>
  <button class="tab" data-v="grid">Sector × factor</button>
  <button class="tab" data-v="opp">Opportunity list</button>
</div>
<div class="bar">
  <label>Index</label>
  <select id="idx"><option value="BIG3">Big-3 (Dow+Nasdaq-100+S&amp;P 500)</option><option value="DOW">Dow 30</option><option value="NDX">Nasdaq-100</option><option value="SPX">S&amp;P 500</option><option value="RUT">Russell 2000</option><option value="ALL">Entire universe</option></select> <label style="margin-left:4px;cursor:pointer"><input type="checkbox" id="wlonly" style="vertical-align:middle"> My watchlist</label>
  <span id="scatterCtl"><label>Plot</label>
    <select id="mode"><option value="rr">Risk vs Return</option><option value="vm">Value vs Momentum</option><option value="fy">FCF yield vs Momentum</option><option value="mf">Money flow vs Return</option><option value="tr">EMA21 distance vs 5d slope</option><option value="od">Upside vs downside odds (21d)</option><option value="ev">Expected-value edge vs Return</option><option value="co">Contradiction vs Return</option><option value="dl">Macro dislocation vs Return</option><option value="mi">Money Flow Index vs Return</option><option value="ff">Factor map (Size vs Value)</option></select></span>
  <span id="periodCtl" class="hidden"><label>Colour</label>
    <select id="period"><option value="ret1m" selected>1-month return</option><option value="ret1w">1-week return</option><option value="ret3m">3-month return</option><option value="ret12m">12-month return</option><option value="flow">Money flow (1m)</option></select></span>
  <div class="spacer"></div><span class="note" id="count"></span>
</div>
<div class="wrap"><canvas id="cv" class="cv"></canvas><div id="opp" class="hidden" style="overflow:auto"></div><div class="legend" id="legend"></div><div class="note" id="src"></div></div>
<div class="tip" id="tip"></div>
<script>
(function(){
  var SECCOL={"Technology":"#4f9cff","Financials":"#16c79a","Health Care":"#e06ee0","Consumer Disc.":"#ffb04d","Communication":"#7ad1ff","Industrials":"#c0c7d0","Consumer Staples":"#8bd17c","Energy":"#ef6a6a","Utilities":"#9aa0ff","Materials":"#d9c14a","Real Estate":"#ff8fb3"};
  var D=null, view="scatter", cv=document.getElementById('cv'), g=cv.getContext('2d'), tip=document.getElementById('tip'), pts=[];
  function $(id){return document.getElementById(id);}
  function dpr(){return Math.min(window.devicePixelRatio||1,2);}
  function size(h){var w=cv.clientWidth;cv.width=w*dpr();cv.height=h*dpr();cv.style.height=h+'px';g.setTransform(dpr(),0,0,dpr(),0,0);return [w,h];}
  function watchSet(){try{return new Set(JSON.parse(localStorage.getItem('mrkt.watchlist')||'[]'));}catch(e){return new Set();}}
  function filtered(){var ix=$('idx').value;var wlo=$('wlonly')&&$('wlonly').checked,wl=wlo?watchSet():null;return D.names.filter(function(n){
    if(wl&&!wl.has(n.t))return false;
    if(ix==='ALL')return true;
    if(ix==='BIG3')return n.idx.indexOf('DOW')>=0||n.idx.indexOf('NDX')>=0||n.idx.indexOf('SPX')>=0;
    return n.idx.indexOf(ix)>=0;});}
  function fmtB(v){return v>=1e12?(v/1e12).toFixed(2)+'T':v>=1e9?(v/1e9).toFixed(0)+'B':(v/1e6).toFixed(0)+'M';}
  function _pp(x){return (x==null)?'—':Math.round(x*100)+'%';}
  function _dr(x){return (x==null||x===0)?'':(x>0?' <span style="color:#16c79a">\u25b2'+Math.round(x*100)+'</span>':' <span style="color:#ef6a6a">\u25bc'+Math.round(-x*100)+'</span>');}
  function ext(a){var v=a.filter(function(x){return x===x;});if(!v.length)return[0,1];var lo=Math.min.apply(0,v),hi=Math.max.apply(0,v);if(lo===hi){lo-=1;hi+=1;}var p=(hi-lo)*0.06;return[lo-p,hi+p];}
  function axes(w,h,pad,xr,yr,xl,yl,x0,y0){g.clearRect(0,0,w,h);g.fillStyle='#0d121b';g.fillRect(0,0,w,h);g.strokeStyle='rgba(255,255,255,.10)';g.fillStyle='#8a93a0';g.font='10px sans-serif';
    for(var i=0;i<=4;i++){var x=pad+i/4*(w-pad-12);g.beginPath();g.moveTo(x,8);g.lineTo(x,h-pad);g.stroke();g.fillText((xr[0]+i/4*(xr[1]-xr[0])).toFixed(1),x-8,h-pad+12);}
    for(var j=0;j<=4;j++){var y=8+j/4*(h-pad-8);g.beginPath();g.moveTo(pad,y);g.lineTo(w-12,y);g.stroke();g.fillText((yr[1]-j/4*(yr[1]-yr[0])).toFixed(1),4,y+3);}
    g.fillStyle='#c0c7d0';g.fillText(xl,w/2-20,h-4);g.save();g.translate(10,h/2+20);g.rotate(-Math.PI/2);g.fillText(yl,0,0);g.restore();
    if(x0!=null){var xz=pad+(x0-xr[0])/(xr[1]-xr[0])*(w-pad-12);g.strokeStyle='rgba(255,255,255,.22)';g.beginPath();g.moveTo(xz,8);g.lineTo(xz,h-pad);g.stroke();}
    if(y0!=null){var yz=8+(yr[1]-y0)/(yr[1]-yr[0])*(h-pad-8);g.strokeStyle='rgba(255,255,255,.22)';g.beginPath();g.moveTo(pad,yz);g.lineTo(w-12,yz);g.stroke();}}
  function netflow(n){return (n.flow&&n.flow.net1m===n.flow.net1m)?n.flow.net1m:0;}
  function scatter(){
    var ns=filtered(),d=size(Math.max(420,Math.min(640,cv.clientWidth*0.62))),W=d[0],H=d[1],pad=44,mode=$('mode').value,xs,ys,xl,yl,x0=null,y0=null;
    if(mode==='rr'){xs=ns.map(function(n){return n.beta;});ys=ns.map(function(n){return n.ret['12m'];});xl='Beta (market risk)';yl='12-month return %';x0=1;y0=0;}
    else if(mode==='vm'){xs=ns.map(function(n){return n.z.val;});ys=ns.map(function(n){return n.z.mom;});xl='Value z (cheap →)';yl='Momentum z';x0=0;y0=0;}
    else if(mode==='fy'){xs=ns.map(function(n){return n.fcfY;});ys=ns.map(function(n){return n.z.mom;});xl='Free cash flow yield %';yl='Momentum z';x0=0;y0=0;}
    else if(mode==='mf'){xs=ns.map(netflow);ys=ns.map(function(n){return n.ret['12m'];});xl='Money flow (1m net, inflow →)';yl='12-month return %';x0=0;y0=0;}
    else if(mode==='tr'){xs=ns.map(function(n){return n.ema21sig==null?0:n.ema21sig;});ys=ns.map(function(n){return n.ema21sl==null?0:n.ema21sl;});xl='EMA21 distance (σ, above →)';yl='EMA21 5-day slope %';x0=0;y0=0;}
    else if(mode==='co'){xs=ns.map(function(n){return n.contra?n.contra.s:0;});ys=ns.map(function(n){return n.ret['12m'];});xl='Signal contradiction (0 aligned → 1 conflicted)';yl='12-month return %';x0=0.5;y0=0;}
    else if(mode==='od'){xs=ns.map(function(n){return n.odds?(n.odds.hi||0)*100:0;});ys=ns.map(function(n){return n.odds?(n.odds.lo||0)*100:0;});xl='P(new 3-month high) within 21d %';yl='P(new 3-month low) within 21d %';x0=null;y0=null;}
    else if(mode==='ev'){xs=ns.map(function(n){return n.ev==null?0:n.ev;});ys=ns.map(function(n){return n.ret['12m'];});xl='Expected-value edge % (P·upside − P·downside)';yl='12-month return %';x0=0;y0=0;}
    else if(mode==='dl'){xs=ns.map(function(n){return (n.z&&n.z.disloc!=null)?n.z.disloc:(n.disloc||0);});ys=ns.map(function(n){return n.ret['12m'];});xl='Macro dislocation z (decoupled →)';yl='12-month return %';x0=0;y0=0;}
    else if(mode==='mi'){xs=ns.map(function(n){return n.mfi==null?50:n.mfi;});ys=ns.map(function(n){return n.ret['12m'];});xl='Money Flow Index (0–100)';yl='12-month return %';x0=50;y0=0;}
    else {xs=ns.map(function(n){return n.z.size;});ys=ns.map(function(n){return n.ff.HML;});xl='Size z (large →)';yl='Value loading (HML)';x0=0;y0=0;}
    var xr=ext(xs),yr=ext(ys);axes(W,H,pad,xr,yr,xl,yl,x0,y0);pts=[];var mc=ns.map(function(n){return Math.log(n.mcap);}),mcr=ext(mc);
    ns.forEach(function(n,i){var px=pad+(xs[i]-xr[0])/(xr[1]-xr[0]||1)*(W-pad-12),py=8+(yr[1]-ys[i])/(yr[1]-yr[0]||1)*(H-pad-8),r=3+7*(mc[i]-mcr[0])/((mcr[1]-mcr[0])||1);
      g.beginPath();g.arc(px,py,r,0,7);g.fillStyle=(SECCOL[n.sec]||'#9aa')+'cc';g.fill();pts.push({x:px,y:py,r:r+2,n:n});});
    legend(true);$('count').textContent=ns.length+' names';}
  function treemap(){
    var ns=filtered().filter(function(n){return n.mcap;}),metric=$('period').value,d=size(Math.max(440,Math.min(680,cv.clientWidth*0.66))),W=d[0],H=d[1];g.clearRect(0,0,W,H);
    var bySec={};ns.forEach(function(n){(bySec[n.sec]=bySec[n.sec]||[]).push(n);});function sum(a){return a.reduce(function(s,n){return s+n.mcap;},0);}
    var secs=Object.keys(bySec).sort(function(a,b){return sum(bySec[b])-sum(bySec[a]);}),tot=sum(ns),cx=2;pts=[];
    function mval(n){return metric==='flow'?netflow(n)*10:(n.ret[metric.replace('ret','')]||0);}
    secs.forEach(function(s){var arr=bySec[s].slice().sort(function(a,b){return b.mcap-a.mcap;}),cw=Math.max(60,(sum(arr)/tot)*(W-4));
      g.fillStyle='#0d121b';g.fillRect(cx,2,cw-2,16);g.fillStyle=SECCOL[s]||'#9aa';g.font='10px sans-serif';g.fillText(s.slice(0,Math.floor(cw/6)),cx+4,14);
      var yy=20,ah=H-22,asum=sum(arr);arr.forEach(function(n){var hh=Math.max(8,(n.mcap/asum)*ah);g.fillStyle=col(mval(n));g.fillRect(cx+1,yy,cw-3,hh-1);
        if(hh>16&&cw>44){g.fillStyle='#0a0d12';g.font='bold 10px sans-serif';g.fillText(n.t,cx+4,yy+12);}pts.push({x:cx+1,y:yy,w:cw-3,h:hh-1,n:n,rect:1});yy+=hh;});cx+=cw;});
    legend(false);$('count').textContent=ns.length+' names · tile colour = '+(metric==='flow'?'money flow':metric.replace('ret','')+' return');}
  function col(v){var t=Math.max(-1,Math.min(1,v/8));return t>=0?'rgba(22,199,154,'+(0.25+0.6*t)+')':'rgba(239,106,106,'+(0.25+0.6*-t)+')';}
  function corr(){var o=D.sectorCorr.order,M=D.sectorCorr.m,n=o.length,d=size(Math.max(380,Math.min(560,cv.clientWidth*0.6))),W=d[0],H=d[1];g.clearRect(0,0,W,H);g.fillStyle='#0d121b';g.fillRect(0,0,W,H);
    var pad=96,cell=Math.min((W-pad-10)/n,(H-pad-10)/n);
    for(var i=0;i<n;i++)for(var j=0;j<n;j++){var v=M[i][j];g.fillStyle=cc(v);g.fillRect(pad+j*cell,pad+i*cell,cell-1,cell-1);if(cell>26){g.fillStyle='rgba(0,0,0,.6)';g.font='9px sans-serif';g.fillText(v.toFixed(2),pad+j*cell+3,pad+i*cell+cell/2+3);}}
    g.fillStyle='#c0c7d0';g.font='9px sans-serif';for(var k=0;k<n;k++){g.fillText(o[k].slice(0,11),3,pad+k*cell+cell/2+3);g.save();g.translate(pad+k*cell+cell/2,pad-4);g.rotate(-Math.PI/3);g.fillText(o[k].slice(0,11),0,0);g.restore();}
    legend(false,true);$('count').textContent='Sector return correlation (clustered)';}
  function cc(v){var t=(v+1)/2;return 'rgb('+Math.round(40+(1-t)*200)+','+Math.round(40+t*150)+','+Math.round(70+t*100)+')';}
  function grid(){var ns=filtered(),secs=D.sectors.filter(function(s){return ns.some(function(n){return n.sec===s;});}),cols=[['ema','EMA21 σ'],['mom','Momentum'],['val','Value'],['size','Size'],['fcf','FCF yld'],['flow','Money flow'],['disloc','Dislocation'],['mfi','MFI'],['contra','Contradiction']];
    var d=size(Math.max(40+secs.length*30,300)),W=d[0],H=d[1];g.clearRect(0,0,W,H);g.fillStyle='#0d121b';g.fillRect(0,0,W,H);
    var pL=118,pT=30,cw=Math.min(120,(W-pL-8)/cols.length),rh=Math.min(30,(H-pT-6)/secs.length);g.fillStyle='#c0c7d0';g.font='10px sans-serif';
    cols.forEach(function(c,j){g.fillText(c[1],pL+j*cw+6,pT-10);});
    secs.forEach(function(s,i){g.fillStyle=SECCOL[s]||'#9aa';g.font='10px sans-serif';g.fillText(s.slice(0,15),6,pT+i*rh+rh/2+3);
      cols.forEach(function(c,j){var m=ns.filter(function(n){return n.sec===s;}).map(function(n){return n.z[c[0]];}),z=m.reduce(function(a,b){return a+b;},0)/(m.length||1);
        g.fillStyle=zc(z);g.fillRect(pL+j*cw+2,pT+i*rh+2,cw-4,rh-3);g.fillStyle='rgba(0,0,0,.72)';g.fillText(z.toFixed(2),pL+j*cw+6,pT+i*rh+rh/2+3);});});
    legend(false,true);$('count').textContent='Average cross-sectional z-score by sector';}
  function zc(z){var t=Math.max(-1,Math.min(1,z/2));return t>=0?'rgba(22,199,154,'+(0.2+0.6*t)+')':'rgba(239,106,106,'+(0.2+0.6*-t)+')';}
  function legend(sec,scale){var L=$('legend');L.innerHTML='';if(sec){Object.keys(SECCOL).forEach(function(s){L.innerHTML+='<span><i class="dot" style="background:'+SECCOL[s]+'"></i>'+s+'</span>';});L.innerHTML+='<span style="color:#8a93a0">• dot size = market cap</span>';}
    else if(scale){L.innerHTML='<span><i class="dot" style="background:#ef6a6a"></i>low / negative</span><span><i class="dot" style="background:#16c79a"></i>high / positive</span>';}
    else{L.innerHTML='<span><i class="dot" style="background:#ef6a6a"></i>down / outflow</span><span><i class="dot" style="background:#16c79a"></i>up / inflow</span><span style="color:#8a93a0">tile size = market cap</span>';}}
  function render(){$('scatterCtl').className=view==='scatter'?'':'hidden';$('periodCtl').className=view==='treemap'?'':'hidden';
    var isOpp=view==='opp';cv.style.display=isOpp?'none':'';$('opp').className=isOpp?'':'hidden';$('legend').style.display=isOpp?'none':'';
    if(isOpp)oppList();else if(view==='scatter')scatter();else if(view==='treemap')treemap();else if(view==='corr')corr();else grid();}
  var oppSort='oppPct';
  function oppList(){
    var ns=filtered().slice().sort(function(a,b){var f=oppSort;function gv(n){return (f==='opp'||f==='oppPct')?(n[f]||0):(f==='ev')?(n.ev||0):(f==='secRel')?(n.secRel||0):(f==='ema')?(n.ema21sig||0):(n.z&&n.z[f]!=null?n.z[f]:0);}return gv(b)-gv(a);});
    function dchip(d){if(!d)return '';var col=d.dir==='with'?'var(--up)':'var(--down)';
      var mk=(d.unexp?' <span style="color:var(--caution)">\u26a0?</span>':'')+(d.lag>0?' <span style="color:var(--faint)">(leads '+d.lag+'w)</span>':'')+(d.stab==='flipped'?' <span style="color:var(--caution)">flipped</span>':(d.sig?'':' <span style="color:var(--faint)">weak</span>'));
      return '<span style="color:'+col+'" title="corr '+d.corr+(d.pcorr!=null?', partial(ex-market) '+d.pcorr:'')+', '+d.stab+(d.lag>0?', factor leads '+d.lag+'w':'')+(d.unexp?', SIGN vs fundamentals UNEXPECTED':'')+'">'+d.f+' '+(d.corr>0?'\u2191\u2192\u2191':'\u2191\u2192\u2193')+' '+(d.sens>0?'+':'')+d.sens+'%/\u03c3'+mk+'</span>';}
    function HD(k,t){return '<th data-s="'+k+'" style="cursor:pointer;'+(oppSort===k?'color:#fff':'')+'">'+t+(oppSort===k?' \u25be':'')+'</th>';}
    var rows=ns.map(function(n,i){
      var deps=(n.deps||[]).slice(0,3).map(dchip).join(' &middot; ');
      var fl=(n.alerts&&n.alerts.length)?' <span style="color:var(--accent)">\u2691</span>':'';
      return '<tr style="border-top:1px solid var(--line)"><td style="color:var(--muted)">'+(i+1)+'</td>'
        +'<td><b style="cursor:pointer" data-t="'+n.t+'">'+n.t+'</b>'+fl+'</td><td style="color:'+(SECCOL[n.sec]||'#9aa')+'">'+n.sec+'</td>'
        +'<td><b>'+(n.oppPct!=null?n.oppPct:'\u2014')+'</b></td>'
        +'<td>'+(n.ema21sig!=null?(n.ema21sig>0?'+':'')+n.ema21sig+'\u03c3':'\u2014')+'</td>'
        +'<td>'+(n.z&&n.z.mom!=null?(n.z.mom>0?'+':'')+n.z.mom:'\u2014')+'</td>'
        +'<td style="color:'+((n.secRel||0)>=0?'var(--up)':'var(--down)')+'">'+((n.secRel||0)>0?'+':'')+(n.secRel!=null?n.secRel:0)+'%</td>'
        +'<td style="color:'+((n.ev||0)>=0?'var(--up)':'var(--down)')+'">'+((n.ev||0)>0?'+':'')+(n.ev!=null?n.ev:0)+'%</td>'
        +'<td>'+((n.odds&&n.odds.hi!=null)?Math.round(n.odds.hi*100)+'%':'\u2014')+'</td>'
        +'<td style="color:var(--muted)">'+(n.macroR2!=null?n.macroR2+'%':'\u2014')+'</td>'
        +'<td style="font-size:10px">'+(deps||'\u2014')+'</td></tr>';}).join('');
    $('opp').innerHTML='<table class="scan" style="width:100%;border-collapse:collapse;font-size:11px"><tr style="text-align:left;color:var(--muted)">'
      +'<th>#</th><th>ticker</th><th>sector</th>'+HD('oppPct','opp')+HD('ema','pos')+HD('mom','mom')+HD('secRel','sec-rel')+HD('ev','EV')+'<th>P(hi)</th><th>macro</th><th>depends on (\u2191factor \u2192 stock, sensitivity %/\u03c3)</th></tr>'+rows+'</table>'
      +'<div class="note" style="margin-top:8px">Ranked by <b>opportunity score</b> = market position (EMA21\u03c3) + momentum + sector-relative strength + expected-value edge, as a cross-sectional percentile. <b>Depends on</b> = the macro deltas / commodities / sector this name is most correlated with: <b>\u2191factor\u2192\u2191/\u2193 stock</b>, <b>%/\u03c3</b> = move per 1-sigma factor change (ex-market), <b>(leads Nw)</b> = factor leads the stock by N weeks, <b>\u26a0?</b> = sign contradicts the economic prior (possibly spurious), <b>flipped</b> = relationship inverted recently. Research only.</div>';
    Array.prototype.forEach.call($('opp').querySelectorAll('th[data-s]'),function(th){th.onclick=function(){oppSort=th.getAttribute('data-s');oppList();};});
    Array.prototype.forEach.call($('opp').querySelectorAll('b[data-t]'),function(b){b.onclick=function(){try{localStorage.setItem('mrkt.jump',b.getAttribute('data-t'));}catch(_){}location.href='index.html';};});
    $('count').textContent=ns.length+' names · ranked by opportunity';}
  cv.addEventListener('mousemove',function(e){var r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,hit=null;
    for(var i=0;i<pts.length;i++){var p=pts[i];if(p.rect){if(mx>=p.x&&mx<=p.x+p.w&&my>=p.y&&my<=p.y+p.h){hit=p;break;}}else{var dx=mx-p.x,dy=my-p.y;if(dx*dx+dy*dy<=p.r*p.r){hit=p;break;}}}
    if(hit){var n=hit.n,fl=(n.flow&&n.flow.net1m===n.flow.net1m)?((n.flow.net1m>0?'+':'')+n.flow.net1m):'—';tip.style.display='block';tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY+12)+'px';
      var mb=n.mb&&Object.keys(n.mb).length?Object.keys(n.mb).map(function(k){return k+' '+(n.mb[k]>0?'+':'')+n.mb[k];}).join(', '):'—';
      var dz=(n.z&&n.z.disloc!=null)?n.z.disloc:(n.disloc!=null?n.disloc:'—');
      var ow=(n.opt&&(n.opt.pw||n.opt.cw))?('<br>OI walls: put '+(n.opt.pw||'—')+' / call '+(n.opt.cw||'—')+(n.opt.pcr!=null?' · P/C '+n.opt.pcr:'')):'';
      var e21=(n.ema21d!=null)?((n.ema21d>0?'+':'')+n.ema21d+'% ('+(n.ema21sig||0)+'σ) · slope '+(n.ema21sl>0?'+':'')+(n.ema21sl||0)+'%'):'—';
      function pT(x){return x?('▲ '+(x.up.d!=null?x.up.d+' ATR':'—')+' p'+(x.up.p!=null?Math.round(x.up.p*100)+'%':'—')+'  ▼ '+(x.dn.d!=null?x.dn.d+' ATR':'—')+' p'+(x.dn.p!=null?Math.round(x.dn.p*100)+'%':'—')):'—';}
      var cc=n.contra?(n.contra.dir+' · contradiction '+n.contra.s+(n.contra.conf&&n.contra.conf.length?' (⚠ '+n.contra.conf.join(', ')+')':'')):'—';
      tip.innerHTML='<b>'+n.t+'</b> '+n.n+' · '+n.sec
        +'<br><b>EMA21:</b> '+e21
        +'<br>nearest: '+pT(n.touch)
        +(n.odds?('<br>odds 21d: '+(n.odds.emaDir==='reclaim'?'reclaim':'hold')+' EMA21 '+_pp(n.odds.ema)+' · new hi '+_pp(n.odds.hi)+_dr(n.odds.drift&&n.odds.drift.hi)+' · new lo '+_pp(n.odds.lo)+_dr(n.odds.drift&&n.odds.drift.lo)+' · revert '+_pp(n.odds.mean)+(n.odds.beat!=null?' · beat '+_pp(n.odds.beat):'')):'')
        +(n.odds?('<br>edge: EV '+(n.ev>0?'+':'')+n.ev+'% ('+n.evPct+'pct) · ~'+(n.odds.tmed&&n.odds.tmed.hi!=null?Math.round(n.odds.tmed.hi)+'d→high':'—')+' · if macro+ '+_pp(n.odds.condHi)+' · regime-flip '+_pp(n.odds.flip)):'')
        +((n.alerts&&n.alerts.length)?'<br><span style="color:var(--accent)">\u2691 '+n.alerts.join(' · ')+'</span>':'')
        +((n.deps&&n.deps.length)?'<br>depends'+(n.macroR2!=null?' (macro '+n.macroR2+'% of moves)':'')+': '+n.deps.slice(0,5).map(function(d){return d.f+' '+(d.corr>0?'\u2191\u2192\u2191':'\u2191\u2192\u2193')+' '+(d.sens>0?'+':'')+d.sens+'%/\u03c3'+(d.lag>0?' leads'+d.lag+'w':'')+(d.unexp?' \u26a0?':'')+(d.stab==='flipped'?' flipped':'');}).join(' · '):'')
        +(n.ivol!=null?'<br>intraday vol: '+n.ivol+'%':'')
        +'<br>signals: '+cc
        +'<br>'+fmtB(n.mcap)+' · β '+n.beta+' · vol '+n.vol+'% · 12m '+n.ret['12m']+'%'
        +'<br>MFI '+(n.mfi==null?'—':n.mfi)+' · ATR '+(n.atr==null?'—':n.atr+'%')+(n.brk?' · ⚠ breakout':'')+' · flow '+fl
        +'<br>driver: '+(n.drv||'—')+' ('+mb+') · disloc '+dz
        +'<br>FCF yld '+(n.fcfY==null?'—':n.fcfY+'%')+ow;}else tip.style.display='none';});
  cv.addEventListener('mouseleave',function(){tip.style.display='none';});
  cv.addEventListener('click',function(e){var r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    for(var i=0;i<pts.length;i++){var p=pts[i],ok;if(p.rect)ok=(mx>=p.x&&mx<=p.x+p.w&&my>=p.y&&my<=p.y+p.h);else{var dx=mx-p.x,dy=my-p.y;ok=dx*dx+dy*dy<=p.r*p.r;}
      if(ok){try{localStorage.setItem('mrkt.jump',p.n.t);}catch(_){}location.href='index.html';return;}}});
  document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});t.classList.add('on');view=t.getAttribute('data-v');render();};});
  ['idx','mode','period','wlonly'].forEach(function(id){var el=$(id);if(el)el.onchange=render;});
  window.addEventListener('resize',function(){clearTimeout(window._rt);window._rt=setTimeout(render,150);});
  function start(d){D=d;var hasR=D.indices&&D.indices.RUT;$('asof').textContent='as of '+D.asof+' · '+D.names.length+' names · '+(hasR?'Dow+Nasdaq-100+S&P 500 + Russell 2000':'big-3 universe');
    var cal='';if(D.calibration&&D.calibration.bins&&D.calibration.bins.length){var hb=D.calibration.bins[D.calibration.bins.length-1];cal=' · touch-model calibration: Brier '+D.calibration.brier+', predicted '+Math.round(hb.pmid*100)+'% → realized '+Math.round(hb.real*100)+'% (n='+D.calibration.n+')';}
    $('src').textContent=D.source+cal+' · odds are model-implied, not guarantees · research only, not investment advice.';render();}
  if(window.MARKETMAP)start(window.MARKETMAP);
  else fetch('marketmap.json',{cache:'no-store'}).then(function(r){return r.json();}).then(start).catch(function(){$('asof').textContent='market map data not available yet';});
})();
</script></body></html>
